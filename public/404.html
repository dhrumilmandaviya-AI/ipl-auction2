<!DOCTYPE html>
<html>
<head>
<script>
  var l = window.location;
  var segmentCount = 1; // 1 for github.com/username/repo
  var pathParts = l.pathname.split('/').slice(0, segmentCount + 1).join('/');
  sessionStorage.redirect = l.href;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    pathParts + '/?/' +
    l.pathname.slice(1).replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
